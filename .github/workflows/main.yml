# Perform a Gradle `build` which includes `assemble`, `check`, `test` of the projects.

name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Check the integrity of the Gradle Wrapper executables
  validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

  # This workflow contains a single job called "build"
  build:
    needs: validation
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Runs this job in parallel for each sub-project
    strategy:
      matrix:
        project-dir:
          - strict-version-matcher-plugin
          - google-services-plugin
          - oss-licenses-plugin

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 17
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          dependency-graph: generate-and-submit

      # Runs a build which includes `check` and `test` tasks
      - name: Perform a Gradle build
        run: ./gradlew build
        working-directory: ./${{ matrix.project-dir }}
